name: Android Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: |
        ./gradlew assembleDebug --stacktrace > gradle_build.log 2>&1 || (cat gradle_build.log | tail -n 200 && exit 1)

    - name: Commit build log on failure
      if: failure()
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        cp gradle_build.log build_fail.log
        git add build_fail.log
        git commit -m "Add build failure log [skip ci]" || true
        git push origin main

    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Friday-App-Debug
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Friday Release v1.0.${{ github.run_number }}
        files: app/build/outputs/apk/debug/app-debug.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
